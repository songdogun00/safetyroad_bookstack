services:
  bookstack:
    build: .
    image: safetyroad_bookstack
    container_name: bookstack
    environment:
      - TZ=Asia/Seoul
      - APP_LANG=ko
      - APP_ENV=production
      - APP_DEBUG="false"
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
    volumes:
      # - ./src:/var/www/bookstack
      - ./src/app:/var/www/bookstack/app
      # - ./src/public:/var/www/bookstack/public
      # - bookstack_public:/var/www/bookstack/public
      - ./src/public/uploads:/var/www/bookstack/public/uploads
      - ./src/resources:/var/www/bookstack/resources
      - ./src/routes:/var/www/bookstack/routes
      - ./src/storage:/var/www/bookstack/storage
      - ./src/bootstrap:/var/www/bookstack/bootstrap
      - bookstack_vendor:/var/www/bookstack/vendor
      # - bookstack_storage:/var/www/bookstack/storage
      # - bookstack_bootstrap:/var/www/bookstack/bootstrap
    restart: unless-stopped
    depends_on:
      bookstack_db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: bookstack_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - bookstack_public:/var/www/bookstack/public:ro # 추가
      # - ./src/public:/var/www/bookstack/public:ro
    depends_on:
      - bookstack
  bookstack_db:
    image: mariadb:11.4
    # command: --lower-case-table-names=1
    container_name: bookstack_db
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./mariadb:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      start_period: 90s
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  bookstack_vendor:
  bookstack_public:
  # bookstack_bootstrap:
